<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>BBD University | Online Student Seat Search</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <img src="images/bbdulogo2.png" alt="BBD University Logo" class="logo">

        <h1>BBD UNIVERSITY</h1>

        <h3>EXAMINATION CELL</h3>

        <h2>ONLINE STUDENT SEAT SEARCH</h2>

        <p class="subtitle">
            Find your Examination Room using your University Roll Number
        </p>

        <div class="search-box">

            <label for="rollNo">
                University Roll Number
            </label>

            <input
                type="text"
                id="rollNo"
                placeholder="Enter University Roll Number"
                autocomplete="off">

            <button id="searchBtn">
                🔍 SEARCH
            </button>

        </div>

        <div id="result"></div>

        <footer>

            <hr>

            <p>
                Issued by<br>
                <strong>Examination Cell</strong><br>
                BBD University
            </p>

        </footer>

    </div>

    <script src="app.js"></script>

</body>

</html>
